{% extends "base.html" %}

{% block title %}Register - E-Commerce Store{% endblock %}

{% block content %}
<div class="auth-container admin-page">
    <h2>Create Account</h2>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{ name or '' }}" required autofocus>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ email or '' }}" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
