{% extends "base.html" %}

{% block title %}Edit Product - Staff - E-Commerce Store{% endblock %}

{% block content %}
<div class="admin-page">
    <h1>Edit Product</h1>
    <p><a href="{{ url_for('staff_product_view', product_id=product.id) }}" class="back-link">&larr; Back to Product</a></p>

    <div class="admin-form-container admin-form-container--wide">
        <form method="POST" action="{{ url_for('staff_product_edit', product_id=product.id) }}" enctype="multipart/form-data" class="auth-form">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" value="{{ product.name }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4">{{ product.description or '' }}</textarea>
            </div>
            <div class="form-group">
                <label for="price">Price *</label>
                <input type="number" id="price" name="price" step="0.01" min="0" value="{{ product.price }}" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" name="quantity" min="0" value="{{ product.quantity }}" required>
            </div>
            <div class="form-group">
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id">
                    <option value="">— Select category —</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {{ 'selected' if product.category_id == cat.id else '' }}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="image">Product Image (optional; leave empty to keep current)</label>
                <input type="file" id="image" name="image" accept=".png,.jpg,.jpeg,.gif,.webp">
                {% if product.image_path %}
                <p class="muted">Current: <img src="{{ url_for('static', filename=product.image_path) }}" alt="" class="product-thumb"> </p>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
