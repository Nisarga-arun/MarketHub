{% extends "base.html" %}

{% block title %}Add Product - Staff - E-Commerce Store{% endblock %}

{% block content %}
<div class="admin-page">
    <h1>Add Product</h1>
    <p><a href="{{ url_for('staff_product_list') }}" class="back-link">&larr; Back to Products</a></p>

    <div class="admin-form-container admin-form-container--wide">
        <form method="POST" action="{{ url_for('staff_product_add') }}" enctype="multipart/form-data" class="auth-form">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" required autofocus>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label for="price">Price *</label>
                <input type="number" id="price" name="price" step="0.01" min="0" value="0" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" name="quantity" min="0" value="0" required>
            </div>
            <div class="form-group">
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id">
                    <option value="">— Select category —</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="image">Product Image</label>
                <input type="file" id="image" name="image" accept=".png,.jpg,.jpeg,.gif,.webp">
            </div>
            <button type="submit" class="btn btn-primary">Add Product</button>
        </form>
    </div>
</div>
{% endblock %}
