{% extends "base.html" %}

{% block title %}Edit Category - Admin - E-Commerce Store{% endblock %}

{% block content %}
<div class="admin-page">
    <h1>Edit Category</h1>
    <p><a href="{{ url_for('admin_category_view', category_id=category.id) }}" class="back-link">&larr; Back to Category</a></p>

    <div class="auth-container" style="max-width: 500px;">
        <form method="POST" action="{{ url_for('admin_category_edit', category_id=category.id) }}" class="auth-form">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" value="{{ name if name is defined else category.name }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4">{{ description if description is defined else (category.description or '') }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
