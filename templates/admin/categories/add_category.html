{% extends "base.html" %}

{% block title %}Add Category - Admin - E-Commerce Store{% endblock %}

{% block content %}
<div class="admin-page">
    <h1>Add Category</h1>
    <p><a href="{{ url_for('admin_category_list') }}" class="back-link">&larr; Back to Categories</a></p>

    <div class="auth-container" style="max-width: 500px;">
        <form method="POST" action="{{ url_for('admin_category_add') }}" class="auth-form">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" value="{{ name or '' }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4">{{ description or '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Add Category</button>
        </form>
    </div>
</div>
{% endblock %}
