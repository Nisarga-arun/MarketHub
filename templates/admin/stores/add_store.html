{% extends "base.html" %}

{% block title %}Add Store - Admin - E-Commerce Store{% endblock %}

{% block content %}
<div class="admin-page">
    <h1>Add Store</h1>
    <p><a href="{{ url_for('admin_store_list') }}" class="back-link">&larr; Back to Stores</a></p>

    <div class="admin-form-container">
        <form method="POST" action="{{ url_for('admin_store_add') }}" class="auth-form">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" value="{{ name or '' }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" value="{{ location or '' }}">
            </div>
            <button type="submit" class="btn btn-primary">Add Store</button>
        </form>
    </div>
</div>
{% endblock %}
