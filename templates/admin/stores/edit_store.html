{% extends "base.html" %}

{% block title %}Edit Store - Admin - E-Commerce Store{% endblock %}

{% block content %}
<div class="admin-page">
    <h1>Edit Store</h1>
    <p><a href="{{ url_for('admin_store_view', store_id=store.id) }}" class="back-link">&larr; Back to Store</a></p>

    <div class="auth-container" style="max-width: 500px;">
        <form method="POST" action="{{ url_for('admin_store_edit', store_id=store.id) }}" class="auth-form">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" value="{{ store.name }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" value="{{ store.location or '' }}">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
